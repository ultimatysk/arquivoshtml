<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classificador NBS — Sábio Contabilidade</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #21262d;
    --border-bright: #30363d;
    --accent: #2ea043;
    --accent-dim: #1a3a25;
    --accent2: #388bfd;
    --accent2-dim: #0d2a5c;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #484f58;
    --yellow: #d29922;
    --yellow-dim: #2e2205;
    --red: #f85149;
    --red-dim: #3d1a19;
    --purple: #a371f7;
    --purple-dim: #2a1f5e;
    --teal: #39d0b4;
    --teal-dim: #0d3530;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 15px; color: #fff;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header-text p {
    font-size: 11px; color: var(--text-dim);
    margin-top: 1px;
  }
  .badge {
    margin-left: auto;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .search-box {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .search-wrap {
    position: relative;
  }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 10px 9px 32px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .15s;
  }
  #searchInput:focus { border-color: var(--accent2); }
  #searchInput::placeholder { color: var(--text-muted); }

  .filters {
    padding: 10px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row {
    display: flex; gap: 6px; align-items: center;
  }
  .filter-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    width: 38px;
    flex-shrink: 0;
  }
  select {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    color: var(--text);
    padding: 5px 8px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent2); }

  .stats-bar {
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stats-count {
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent2);
    font-weight: 600;
  }

  .results-list {
    overflow-y: auto;
    flex: 1;
  }
  .results-list::-webkit-scrollbar { width: 4px; }
  .results-list::-webkit-scrollbar-track { background: transparent; }
  .results-list::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .result-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
    position: relative;
  }
  .result-item:hover { background: var(--surface2); }
  .result-item.active {
    background: var(--accent2-dim);
    border-left: 3px solid var(--accent2);
    padding-left: 13px;
  }
  .item-nbs {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    font-weight: 500;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .item-nbs .item-lc {
    color: var(--text-muted);
    font-size: 10px;
  }
  .item-desc {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .item-item {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tag-mini {
    display: inline-flex; align-items: center;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .tag-trib {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid rgba(46,160,67,.3);
  }
  .tag-red {
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid rgba(248,81,73,.3);
  }
  .tag-yellow {
    background: var(--yellow-dim);
    color: var(--yellow);
    border: 1px solid rgba(210,153,34,.3);
  }
  .tag-purple {
    background: var(--purple-dim);
    color: var(--purple);
    border: 1px solid rgba(163,113,247,.3);
  }
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 10px; }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    overflow-y: auto;
    padding: 28px 36px;
    background: var(--bg);
  }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  .detail-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
  }
  .detail-empty .big-icon {
    font-size: 48px;
    opacity: .3;
  }
  .detail-empty p { font-size: 13px; max-width: 280px; text-align: center; line-height: 1.5; }

  .detail-header {
    margin-bottom: 24px;
  }
  .detail-nbs {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent2);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .copy-btn {
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: 5px;
    color: var(--text-dim);
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    transition: all .15s;
  }
  .copy-btn:hover {
    background: var(--accent2-dim);
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .copy-btn.copied {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .detail-desc-nbs {
    font-size: 16px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .detail-desc-nbs.empty-desc {
    color: var(--text-muted);
    font-style: italic;
    font-size: 14px;
  }
  .detail-item-ref {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
  }
  .detail-item-ref strong {
    color: var(--text);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    display: block;
    margin-bottom: 4px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .field-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .15s;
  }
  .field-card:hover { border-color: var(--border-bright); }
  .field-card.full { grid-column: 1 / -1; }
  .field-key {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .field-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
    word-break: break-word;
  }
  .field-value.mono {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }
  .field-empty { color: var(--text-muted); font-style: italic; }

  .classtrib-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .classtrib-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .classtrib-nome {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.4;
  }

  .indop-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
  }

  .related-section {
    margin-top: 28px;
  }
  .related-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .related-item:hover {
    border-color: var(--accent2);
    background: var(--surface2);
  }
  .related-nbs {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    flex-shrink: 0;
    padding-top: 1px;
    min-width: 100px;
  }
  .related-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
  }

  /* tag colors by category */
  .cat-integral { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(46,160,67,.4); }
  .cat-saude { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(163,113,247,.4); }
  .cat-imov { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(210,153,34,.4); }
  .cat-fin { background: var(--accent2-dim); color: var(--accent2); border: 1px solid rgba(56,139,253,.4); }
  .cat-agro { background: #1a2e1a; color: #56d364; border: 1px solid rgba(86,211,100,.4); }
  .cat-outros { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

  /* highlight */
  mark {
    background: rgba(56,139,253,.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; height: auto; }
    .sidebar { height: 50vh; }
    .detail-panel { padding: 20px; }
    .fields-grid { grid-template-columns: 1fr; }
  }

  /* ── BENEFIT BANNER ── */
  .benefit-banner {
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    border: 1px solid;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .benefit-banner.integral {
    background: rgba(36,41,47,.6);
    border-color: var(--border-bright);
  }
  .benefit-banner.reducao60 {
    background: linear-gradient(135deg, rgba(46,160,67,.12) 0%, rgba(56,139,253,.08) 100%);
    border-color: rgba(46,160,67,.4);
  }
  .benefit-banner.reducao30 {
    background: linear-gradient(135deg, rgba(56,139,253,.1) 0%, rgba(163,113,247,.08) 100%);
    border-color: rgba(56,139,253,.4);
  }
  .benefit-banner.zero {
    background: linear-gradient(135deg, rgba(57,208,180,.12) 0%, rgba(46,160,67,.08) 100%);
    border-color: rgba(57,208,180,.4);
  }
  .benefit-banner.isencao {
    background: linear-gradient(135deg, rgba(57,208,180,.15) 0%, rgba(163,113,247,.08) 100%);
    border-color: rgba(57,208,180,.5);
  }
  .benefit-banner.financeiro {
    background: rgba(56,139,253,.08);
    border-color: rgba(56,139,253,.3);
  }
  .benefit-icon { font-size: 28px; flex-shrink: 0; line-height: 1; }
  .benefit-body { flex: 1; }
  .benefit-tipo {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .benefit-tipo.integral { color: var(--text-dim); }
  .benefit-tipo.reducao60 { color: var(--accent); }
  .benefit-tipo.reducao30 { color: var(--accent2); }
  .benefit-tipo.zero { color: var(--teal); }
  .benefit-tipo.isencao { color: var(--teal); }
  .benefit-tipo.financeiro { color: var(--accent2); }
  .benefit-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.45;
    margin-bottom: 8px;
  }
  .benefit-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .benefit-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }
  .pill-reducao60 { background: rgba(46,160,67,.2); color: #56d364; border: 1px solid rgba(46,160,67,.4); }
  .pill-reducao30 { background: rgba(56,139,253,.2); color: var(--accent2); border: 1px solid rgba(56,139,253,.4); }
  .pill-zero { background: rgba(57,208,180,.2); color: var(--teal); border: 1px solid rgba(57,208,180,.4); }
  .pill-isencao { background: rgba(57,208,180,.2); color: var(--teal); border: 1px solid rgba(57,208,180,.4); }
  .pill-integral { background: rgba(139,148,158,.1); color: var(--text-muted); border: 1px solid var(--border-bright); }
  .pill-financeiro { background: rgba(56,139,253,.15); color: var(--accent2); border: 1px solid rgba(56,139,253,.3); }
  .art-ref {
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'IBM Plex Mono', monospace;
  }

</style>
</head>
<body>

<header>
  <div class="logo-mark">S</div>
  <div class="header-text">
    <h1>Classificador NBS — Reforma Tributária</h1>
    <p>LC 214/2025 · Correlação NBS × ISS LC 116/2003 · cClassTrib · INDOP · Local IBS</p>
  </div>
  <span class="badge" id="totalBadge">…</span>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="search-box">
      <div class="search-label">Buscar serviço</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Ex: contabilidade, construção, saúde…" autocomplete="off">
      </div>
    </div>

    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">ISS</span>
        <select id="filterItem">
          <option value="">Todos os itens LC 116</option>
        </select>
      </div>
      <div class="filter-row">
        <span class="filter-label">ClassTrib</span>
        <select id="filterClasstrib">
          <option value="">Todas as situações</option>
        </select>
      </div>
    </div>

    <div class="stats-bar">
      <span class="stats-count" id="countLabel">0</span>
      <span>resultados</span>
    </div>

    <div class="results-list" id="resultsList"></div>
  </aside>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="big-icon">📋</div>
      <p>Selecione um item da lista à esquerda para ver todos os detalhes de classificação NBS conforme LC 214/2025.</p>
    </div>
  </div>
</div>

o60"},"200044":{"cst":"200","tipo":"Redução de Alíquota — 60%","reducao_ibs":60,"reducao_cbs":60,"descricao_resumida":"Segurança da informação/cibernética por sociedade com sócio brasileiro (Anexo XI)","art_lc214":"Art. 142, Anexo XI","cor":"reducao60"},"200045.0":{"cst":"200","tipo":"Redução de Alíquota — 60%","reducao_ibs":60,"reducao_cbs":60,"descricao_resumida":"Reabilitação urbana de zonas históricas e áreas críticas","art_lc214":"Arts. 157–158","cor":"reducao60"},"200046":{"cst":"200","tipo":"Redução de Alíquota — 60%","reducao_ibs":60,"reducao_cbs":60,"descricao_resumida":"Operações com bens imóveis","art_lc214":"Arts. 258–268","cor":"reducao60"},"200048":{"cst":"200","tipo":"Redução de Alíquota — 60%","reducao_ibs":60,"reducao_cbs":60,"descricao_resumida":"Hotelaria, parques de diversão e parques temáticos","art_lc214":"Art. 128, VIII","cor":"reducao60"},"200051":{"cst":"200","tipo":"Redução de Alíquota — 60%","reducao_ibs":60,"reducao_cbs":60,"descricao_resumida":"Agências de turismo","art_lc214":"Art. 128","cor":"reducao60"},"200052":{"cst":"200","tipo":"Redução de Alíquota — 30%","reducao_ibs":30,"reducao_cbs":30,"descricao_resumida":"Profissões intelectuais regulamentadas por conselho profissional","art_lc214":"Art. 127","cor":"reducao30"},"400001":{"cst":"400","tipo":"Isenção","reducao_ibs":100,"reducao_cbs":100,"descricao_resumida":"Transporte público coletivo rodoviário e metroviário","art_lc214":"Art. 284","cor":"isencao"}};

entries.forEach(e => {
  e._searchText = [e.i, e.d, e.n, e.dn, e.nc, e.lo, e.cc].join(' ').toLowerCase();
});

// Unique items for filter
const uniqueItems = [...new Set(entries.filter(e=>e.i).map(e=>e.i+' – '+e.d.substring(0,60)))]
  .sort((a,b)=>a.localeCompare(b,'pt-BR'));

const uniqueClasstrb = [...new Map(entries.filter(e=>e.cc).map(e=>[e.cc, e.nc])).entries()]
  .sort((a,b)=>a[0].localeCompare(b[0]));

// Populate filters
const filterItem = document.getElementById('filterItem');
uniqueItems.forEach(u => {
  const opt = document.createElement('option');
  const code = u.split(' – ')[0];
  opt.value = code;
  opt.textContent = u.substring(0,80)+(u.length>80?'…':'');
  filterItem.appendChild(opt);
});

const filterClasstrib = document.getElementById('filterClasstrib');
uniqueClasstrb.forEach(([code, nome]) => {
  const opt = document.createElement('option');
  opt.value = code;
  opt.textContent = code + ' · ' + nome.substring(0,55)+(nome.length>55?'…':'');
  filterClasstrib.appendChild(opt);
});

document.getElementById('totalBadge').textContent = entries.length + ' linhas';

// ── RENDER ──

function renderBeneficio(cc) {
  const b = cc ? BENEFICIO_MAP[cc] : null;
  if (!cc) {
    return `<div class="benefit-banner integral">
      <div class="benefit-icon">⬜</div>
      <div class="benefit-body">
        <div class="benefit-tipo integral">Sem cClassTrib definido</div>
        <div class="benefit-desc">Este NBS não possui cClassTrib atribuído na tabela de correlação. Verifique o item pai da LC 116.</div>
      </div>
    </div>`;
  }
  if (!b) {
    return `<div class="benefit-banner integral">
      <div class="benefit-icon">📋</div>
      <div class="benefit-body">
        <div class="benefit-tipo integral">Situação não mapeada</div>
        <div class="benefit-desc">cClassTrib <strong>${cc}</strong> não consta no mapeamento de benefícios. Verifique na tabela IT 2025.002.</div>
      </div>
    </div>`;
  }

  const icons = {integral:'⬛',reducao60:'🟢',reducao30:'🔵',zero:'✨',isencao:'🔷',financeiro:'🏦'};
  const icon = icons[b.cor] || '📋';

  let pillHtml = '';
  if (b.reducao_ibs === 100) {
    pillHtml = `<span class="benefit-pill pill-${b.cor}">IBS: 100% redução</span><span class="benefit-pill pill-${b.cor}">CBS: 100% redução</span>`;
  } else if (b.reducao_ibs > 0) {
    pillHtml = `<span class="benefit-pill pill-${b.cor}">IBS: −${b.reducao_ibs}%</span><span class="benefit-pill pill-${b.cor}">CBS: −${b.reducao_cbs}%</span>`;
  } else {
    pillHtml = `<span class="benefit-pill pill-integral">Sem redução de alíquota</span>`;
  }
  if (b.art_lc214 && b.art_lc214 !== '—') {
    pillHtml += `<span class="art-ref">LC 214 · ${b.art_lc214}</span>`;
  }

  return `<div class="benefit-banner ${b.cor}">
    <div class="benefit-icon">${icon}</div>
    <div class="benefit-body">
      <div class="benefit-tipo ${b.cor}">${b.tipo}</div>
      <div class="benefit-desc">${b.descricao_resumida}</div>
      <div class="benefit-pills">${pillHtml}</div>
    </div>
  </div>`;
}

let currentIndex = null;
let filteredEntries = [];

function getQuery() {
  return document.getElementById('searchInput').value.trim().toLowerCase();
}

function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark>${m}</mark>`);
}

function getTagClass(cc) {
  if (!cc) return 'cat-outros';
  if (cc === '000001') return 'cat-integral';
  if (['200029','011002','011003','011005','011001'].includes(cc)) return 'cat-saude';
  if (['200046','200027','000002'].includes(cc)) return 'cat-imov';
  if (['010002','000002'].includes(cc)) return 'cat-fin';
  if (['200038'].includes(cc)) return 'cat-agro';
  return 'cat-outros';
}

function getTagLabel(cc, nc) {
  if (!cc) return '—';
  if (cc === '000001') return 'Tributado IBS/CBS';
  return nc ? nc.substring(0,40)+(nc.length>40?'…':'') : cc;
}

function renderList() {
  const q = getQuery();
  const itemF = filterItem.value;
  const ctF = filterClasstrib.value;

  filteredEntries = entries.filter(e => {
    if (itemF && e.i !== itemF) return false;
    if (ctF && e.cc !== ctF) return false;
    if (q) return e._searchText.includes(q);
    return true;
  });

  // Deduplicate for display by NBS (show each NBS once in the list, but keep all data)
  // Actually show all rows to allow drilling in
  document.getElementById('countLabel').textContent = filteredEntries.length;

  const list = document.getElementById('resultsList');

  if (filteredEntries.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔎</div><p>Nenhum resultado encontrado. Tente outros termos.</p></div>`;
    return;
  }

  list.innerHTML = filteredEntries.slice(0, 300).map((e, idx) => {
    const tagClass = getTagClass(e.cc);
    const tagLabel = e.cc ? e.cc : null;
    const hasNbs = !!e.n;
    return `
      <div class="result-item${currentIndex === idx ? ' active' : ''}" onclick="selectEntry(${idx})">
        <div class="item-nbs">
          ${hasNbs ? `<span>${highlight(e.n, q)}</span>` : `<span style="color:var(--text-muted);font-size:10px;">sem NBS</span>`}
          ${e.i ? `<span class="item-lc">LC ${e.i}</span>` : ''}
          ${e.cc ? `<span class="tag-mini ${tagClass}">${e.cc}</span>` : ''}
        </div>
        <div class="item-desc">${highlight(e.dn || e.d || '—', q)}</div>
        ${e.d && e.dn ? `<div class="item-item">${highlight(e.d.substring(0,80)+(e.d.length>80?'…':''), q)}</div>` : ''}
      </div>`;
  }).join('');

  if (filteredEntries.length > 300) {
    list.innerHTML += `<div class="stats-bar" style="justify-content:center;font-size:11px;color:var(--text-muted);">Mostrando 300 de ${filteredEntries.length}. Refine a busca.</div>`;
  }
}

function selectEntry(idx) {
  currentIndex = idx;
  const e = filteredEntries[idx];

  // Update active state
  document.querySelectorAll('.result-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  // Find all related entries with same LC 116 item (other NBS codes)
  const related = e.i ? entries.filter(r => r.i === e.i && r.n !== e.n && r.n) : [];
  const uniqueRelated = [...new Map(related.map(r=>[r.n, r])).values()].slice(0, 20);

  // Classify tag
  const tagClass = getTagClass(e.cc);

  const detail = document.getElementById('detailPanel');
  detail.innerHTML = `
    <div class="detail-header">
      <div class="detail-nbs">
        ${e.n ? e.n : '<span style="color:var(--text-muted);font-size:14px;font-style:italic;">Código NBS não especificado</span>'}
        ${e.n ? `<button class="copy-btn" onclick="copyNbs('${e.n}', this)">Copiar</button>` : ''}
      </div>
      <div class="detail-desc-nbs${e.dn ? '' : ' empty-desc'}">${e.dn || 'Sem descrição NBS'}</div>
    </div>

    ${e.i ? `
    <div class="detail-item-ref">
      <strong>Item LC 116/2003 — ISS</strong>
      <span>${e.i} · ${e.d}</span>
    </div>
    ` : ''}

    <div class="section-title">Dados Fiscais — LC 214/2025</div>
    ${renderBeneficio(e.cc)}
    <div class="fields-grid">
      <div class="field-card">
        <div class="field-key">cClassTrib</div>
        <div class="field-value mono ${e.cc ? '' : 'field-empty'}">${e.cc || '—'}</div>
      </div>
      <div class="field-card">
        <div class="field-key">CST IBS/CBS</div>
        <div class="field-value mono">${BENEFICIO_MAP[e.cc] ? BENEFICIO_MAP[e.cc].cst : (e.cc ? e.cc.substring(0,3) : '—')}</div>
      </div>
      <div class="field-card full">
        <div class="field-key">Nome cClassTrib</div>
        <div class="field-value ${e.nc ? '' : 'field-empty'}">${e.nc || '—'}</div>
      </div>
      <div class="field-card">
        <div class="field-key">INDOP</div>
        <div class="field-value mono ${e.op ? '' : 'field-empty'}">${e.op || '—'}</div>
      </div>
      <div class="field-card">
        <div class="field-key">Local de Incidência IBS</div>
        <div class="field-value ${e.lo ? '' : 'field-empty'}">${e.lo || '—'}</div>
      </div>
      <div class="field-card">
        <div class="field-key">PS Onerosa?</div>
        <div class="field-value">
          ${e.ps === 'S' ? '<span style="color:var(--accent)">✓ Sim</span>' : e.ps === 'N' ? '<span style="color:var(--red)">✗ Não</span>' : '<span class="field-empty">—</span>'}
        </div>
      </div>
      <div class="field-card">
        <div class="field-key">Adq. Exterior?</div>
        <div class="field-value">
          ${e.ae === 'S' ? '<span style="color:var(--accent)">✓ Sim</span>' : e.ae === 'N' ? '<span style="color:var(--red)">✗ Não</span>' : '<span class="field-empty">—</span>'}
        </div>
      </div>
    </div>

    ${uniqueRelated.length > 0 ? `
    <div class="related-section">
      <div class="section-title">Outros NBS no mesmo item LC 116 (${uniqueRelated.length})</div>
      ${uniqueRelated.map(r => `
        <div class="related-item" onclick="selectByNbs('${r.n}')">
          <span class="related-nbs">${r.n}</span>
          <span class="related-desc">${r.dn || '—'}</span>
        </div>
      `).join('')}
    </div>
    ` : ''}
  `;
}

function copyNbs(nbs, btn) {
  navigator.clipboard.writeText(nbs).then(() => {
    btn.textContent = 'Copiado!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 1800);
  });
}

function selectByNbs(nbs) {
  const idx = filteredEntries.findIndex(e => e.n === nbs);
  if (idx >= 0) selectEntry(idx);
  else {
    // Search for it globally
    document.getElementById('searchInput').value = nbs;
    renderList();
    setTimeout(() => { if (filteredEntries.length > 0) selectEntry(0); }, 50);
  }
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', () => { currentIndex = null; renderList(); });
document.getElementById('filterItem').addEventListener('change', () => { currentIndex = null; renderList(); });
document.getElementById('filterClasstrib').addEventListener('change', () => { currentIndex = null; renderList(); });

// Initial render
renderList();
</script>
</body>
</html>
